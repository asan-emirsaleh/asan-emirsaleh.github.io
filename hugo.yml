languageCode: "en-uk" 
title: Asan Emirsale personal page
theme: ["PaperMod", "hugo-embed-pdf-shortcode"]

enableInlineShortcodes: true
defaultContentLanguageInSubdir: false 
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
    tag: tags

menu:
