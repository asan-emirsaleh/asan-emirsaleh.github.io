<!-- GLightbox JS -->
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    GLightbox({
      selector: '.glightbox',
      touchNavigation: true,
      loop: false,
      zoomable: true,
      draggable: true,
      closeOnOutsideClick: true,
      openEffect: 'zoom',
      closeEffect: 'zoom'
    });
  });
</script>
